<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__LANDING_TITLE__</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      user-select: none;
    }

    .logo-icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.95;
    }

    .logo-name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1rem 2.25rem;
      background: #f0f0f0;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover  { background: #ffffff; }
    .btn:active { transform: scale(0.97); }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-secondary {
      background: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #333;
    }

    .btn-secondary:hover {
      background: #222;
      border-color: #444;
    }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo.webp" alt="Riversway Movement Studio" class="logo-icon" />
    <span class="logo-name">__LANDING_STUDIO_NAME__</span>
    <span class="logo-sub">__LANDING_SUBTITLE__</span>
  </div>

  <div class="buttons">
    <a class="btn" href="__CONTROL_URL__">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M8 8h3v3H8zM13 8h3v3h-3zM8 13h3v3H8zM13 13h3v3h-3z"/>
      </svg>
      Advanced Control
    </a>

    <a class="btn btn-secondary" href="__QLC_URL__">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12
                 M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
      </svg>
      QLC+ Dashboard
    </a>
  </div>

  <footer>__LANDING_FOOTER_TEXT__</footer>

</body>
</html>
