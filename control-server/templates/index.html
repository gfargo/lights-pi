<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighting Control</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
        }

        .status {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.75rem 1rem;
            border-radius: 0;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            color: #999;
            text-align: center;
        }

        .status.online {
            background: #0d2818;
            border-color: #1a4d2e;
            color: #4ade80;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            overflow-x: auto;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #666;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            color: #f0f0f0;
        }

        .tab.active {
            color: #f0f0f0;
            border-bottom-color: #f0f0f0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* AI Control Tab */
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        #commandInput {
            flex: 1;
            padding: 0.875rem 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0;
            font-size: 0.95rem;
            color: #f0f0f0;
            transition: border-color 0.2s;
        }

        #commandInput:focus {
            outline: none;
            border-color: #555;
        }

        #commandInput::placeholder {
            color: #555;
        }

        button {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 0;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.03em;
        }

        #sendBtn {
            background: #f0f0f0;
            color: #0a0a0a;
        }

        #sendBtn:hover:not(:disabled) {
            background: #ffffff;
        }

        #sendBtn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        #voiceBtn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #f0f0f0;
            min-width: 50px;
        }

        #voiceBtn:hover {
            background: #222;
        }

        #voiceBtn.listening {
            background: #dc2626;
            border-color: #dc2626;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 1rem;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .chip {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 0;
            font-size: 0.85rem;
            color: #999;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: #f0f0f0;
            border-color: #f0f0f0;
            color: #0a0a0a;
        }

        /* Groups Tab */
        .group-item {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 0;
            margin-bottom: 0.75rem;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .group-name {
            font-weight: 600;
            color: #f0f0f0;
            font-size: 0.95rem;
        }

        .group-fixtures {
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 0.05em;
        }

        .group-templates {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .template-btn {
            background: #f0f0f0;
            color: #0a0a0a;
            padding: 0.4rem 0.875rem;
            border-radius: 0;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            letter-spacing: 0.03em;
        }

        .template-btn:hover {
            background: #ffffff;
        }

        /* Virtual Console Tab */
        .fixture-control {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 0;
            margin-bottom: 0.75rem;
        }

        .fixture-name {
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .channel-controls {
            display: grid;
            gap: 0.75rem;
        }

        .channel-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .channel-label {
            min-width: 70px;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 0.03em;
        }

        .channel-slider {
            flex: 1;
            height: 6px;
            border-radius: 0;
            background: #333;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .channel-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 0;
            background: #f0f0f0;
            cursor: pointer;
        }

        .channel-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 0;
            background: #f0f0f0;
            cursor: pointer;
            border: none;
        }

        .channel-value {
            min-width: 35px;
            text-align: right;
            font-size: 0.8rem;
            font-weight: 600;
            color: #f0f0f0;
            font-variant-numeric: tabular-nums;
        }

        /* History */
        .history {
            margin-top: 2rem;
        }

        .history-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 3px solid #f0f0f0;
            padding: 0.875rem;
            border-radius: 0;
            margin-bottom: 0.5rem;
        }

        .history-item.error {
            border-left-color: #dc2626;
            background: #1a0a0a;
        }

        .history-command {
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .history-action {
            font-size: 0.8rem;
            color: #999;
        }

        .history-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.25rem;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #f0f0f0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #f0f0f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem 0.75rem;
            }

            h1 {
                font-size: 1.25rem;
            }

            .input-group {
                flex-direction: column;
            }

            #voiceBtn {
                width: 100%;
            }

            .tab {
                padding: 0.75rem 1rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg class="logo-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="36" cy="36" r="34" stroke="#444" stroke-width="2"/>
                <circle cx="36" cy="36" r="10" fill="#f0f0f0" opacity="0.9"/>
                <line x1="36" y1="4"  x2="36" y2="16" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="36" y1="56" x2="36" y2="68" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="4"  y1="36" x2="16" y2="36" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="56" y1="36" x2="68" y2="36" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="14.1" y1="14.1" x2="22.4" y2="22.4" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="49.6" y1="49.6" x2="57.9" y2="57.9" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="57.9" y1="14.1" x2="49.6" y2="22.4" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                <line x1="22.4" y1="49.6" x2="14.1" y2="57.9" stroke="#555" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h1>Lighting Control</h1>
            <p class="subtitle">Advanced Control Interface</p>
        </div>

        <div id="status" class="status">
            Checking connection...
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('ai')">AI Control</button>
            <button class="tab" onclick="switchTab('groups')">Groups</button>
            <button class="tab" onclick="switchTab('console')">Virtual Console</button>
        </div>

        <div id="ai-tab" class="tab-content active">
            <div class="input-group">
                <input 
                    type="text" 
                    id="commandInput" 
                    placeholder="Try: 'make it warmer' or 'party mode'"
                    autocomplete="off"
                >
                <button id="voiceBtn" title="Voice input">🎤</button>
                <button id="sendBtn">Send</button>
            </div>

            <div class="section-title">Quick Commands</div>
            <div class="example-chips">
                <span class="chip" data-command="make it brighter">Brighter</span>
                <span class="chip" data-command="make it warmer">Warmer</span>
                <span class="chip" data-command="party mode">Party</span>
                <span class="chip" data-command="youtube studio">Studio</span>
                <span class="chip" data-command="ambient lighting">Ambient</span>
                <span class="chip" data-command="add more blue">More Blue</span>
                <span class="chip" data-command="fade to black">Fade Out</span>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing command...</p>
            </div>

            <div class="history">
                <div class="section-title">Command History</div>
                <div id="historyList"></div>
            </div>
        </div>

        <div id="groups-tab" class="tab-content">
            <div class="section-title">Fixture Groups</div>
            <div id="groupsList"></div>
        </div>

        <div id="console-tab" class="tab-content">
            <div class="section-title">Virtual Console</div>
            <div id="fixturesList"></div>
        </div>

        <footer>lights.local</footer>
    </div>

    <script>
        const commandInput = document.getElementById('commandInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const loading = document.getElementById('loading');
        const historyList = document.getElementById('historyList');
        const statusDiv = document.getElementById('status');

        let recognition = null;
        let isListening = false;

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'groups') {
                loadGroups();
            } else if (tabName === 'console') {
                loadFixtures();
            }
        }

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                commandInput.value = transcript;
                sendCommand();
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.classList.remove('listening');
                voiceBtn.textContent = '🎤';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isListening = false;
                voiceBtn.classList.remove('listening');
                voiceBtn.textContent = '🎤';
            };
        } else {
            voiceBtn.style.display = 'none';
        }

        // Check status
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.qlc_running) {
                    statusDiv.className = 'status online';
                    statusDiv.textContent = `✓ Connected • ${data.ai_provider} (${data.ai_model})`;
                } else {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '⚠ QLC+ not running';
                }
            } catch (error) {
                statusDiv.className = 'status';
                statusDiv.textContent = '✗ Connection error';
            }
        }

        // Send command
        async function sendCommand() {
            const command = commandInput.value.trim();
            if (!command) return;

            loading.classList.add('active');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command })
                });

                const data = await response.json();
                addToHistory(command, data);
                commandInput.value = '';

            } catch (error) {
                addToHistory(command, {
                    success: false,
                    error: error.message
                });
            } finally {
                loading.classList.remove('active');
                sendBtn.disabled = false;
                commandInput.focus();
            }
        }

        // Add to history
        function addToHistory(command, result) {
            const item = document.createElement('div');
            item.className = 'history-item' + (result.success ? '' : ' error');
            
            const time = new Date().toLocaleTimeString();
            const action = result.action ? result.action.explanation || result.action.action : 'Error';
            
            item.innerHTML = `
                <div class="history-command">${command}</div>
                <div class="history-action">${action}</div>
                <div class="history-time">${time}</div>
            `;
            
            historyList.insertBefore(item, historyList.firstChild);
            
            if (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        // Load fixture groups
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                const groupsList = document.getElementById('groupsList');
                
                if (!data.groups || data.groups.length === 0) {
                    groupsList.innerHTML = '<p style="color: #666; font-size: 0.85rem;">No fixture groups found</p>';
                    return;
                }
                
                groupsList.innerHTML = '';
                
                const templates = ['youtube-studio', 'party', 'ambient', 'warm-white', 'cool-white'];
                
                data.groups.forEach(group => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'group-item';
                    
                    const fixtureCount = group.fixtures.length;
                    const fixtureText = `${fixtureCount} fixture${fixtureCount !== 1 ? 's' : ''}`;
                    
                    groupDiv.innerHTML = `
                        <div class="group-header">
                            <div>
                                <div class="group-name">${group.name}</div>
                                <div class="group-fixtures">${fixtureText}</div>
                            </div>
                        </div>
                        <div class="group-templates">
                            ${templates.map(t => `
                                <button class="template-btn" onclick="applyGroupTemplate('${group.name}', '${t}')">
                                    ${t.replace('-', ' ')}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    
                    groupsList.appendChild(groupDiv);
                });
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }
        
        // Apply template to group
        async function applyGroupTemplate(groupName, template) {
            loading.classList.add('active');
            
            try {
                const response = await fetch(`/api/groups/${encodeURIComponent(groupName)}/template`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ template })
                });
                
                const data = await response.json();
                addToHistory(`Apply ${template} to ${groupName}`, data);
                
            } catch (error) {
                addToHistory(`Apply ${template} to ${groupName}`, {
                    success: false,
                    error: error.message
                });
            } finally {
                loading.classList.remove('active');
            }
        }

        // Load fixtures for virtual console
        async function loadFixtures() {
            try {
                const response = await fetch('/api/fixtures');
                const data = await response.json();
                const fixturesList = document.getElementById('fixturesList');
                
                if (!data.fixtures || data.fixtures.length === 0) {
                    fixturesList.innerHTML = '<p style="color: #666; font-size: 0.85rem;">No fixtures found</p>';
                    return;
                }
                
                fixturesList.innerHTML = '';
                
                data.fixtures.forEach(fixture => {
                    const fixtureDiv = document.createElement('div');
                    fixtureDiv.className = 'fixture-control';
                    
                    const channels = getChannelNames(fixture.name, fixture.channels);
                    
                    const channelControls = channels.map((channelName, index) => `
                        <div class="channel-control">
                            <div class="channel-label">${channelName}</div>
                            <input 
                                type="range" 
                                class="channel-slider" 
                                min="0" 
                                max="255" 
                                value="0"
                                data-fixture="${fixture.id}"
                                data-channel="${index}"
                                onchange="updateChannel(${fixture.id}, ${index}, this.value)"
                            >
                            <div class="channel-value">0</div>
                        </div>
                    `).join('');
                    
                    fixtureDiv.innerHTML = `
                        <div class="fixture-name">${fixture.name}</div>
                        <div class="channel-controls">
                            ${channelControls}
                        </div>
                    `;
                    
                    fixturesList.appendChild(fixtureDiv);
                });
                
                document.querySelectorAll('.channel-slider').forEach(slider => {
                    slider.addEventListener('input', function() {
                        this.parentElement.querySelector('.channel-value').textContent = this.value;
                    });
                });
            } catch (error) {
                console.error('Error loading fixtures:', error);
            }
        }
        
        // Get channel names based on fixture type
        function getChannelNames(fixtureName, channelCount) {
            const name = fixtureName.toLowerCase();
            
            if (name.includes('par') || name.includes('rgb')) {
                if (channelCount >= 3) {
                    return ['Red', 'Green', 'Blue', 'Dimmer'].slice(0, channelCount);
                }
            }
            
            if (name.includes('56') || name.includes('moving') || name.includes('spot')) {
                const channels = ['Pan', 'Tilt', 'Dimmer', 'Shutter', 'Color', 'Gobo', 'Prism', 'Focus'];
                return channels.slice(0, channelCount);
            }
            
            if (channelCount === 1) {
                return ['Dimmer'];
            }
            
            return Array.from({length: channelCount}, (_, i) => `Ch ${i + 1}`);
        }
        
        // Update channel value
        async function updateChannel(fixtureId, channel, value) {
            console.log(`Fixture ${fixtureId}, Channel ${channel}: ${value}`);
            // TODO: Implement QLC+ WebSocket API integration
        }

        // Event listeners
        sendBtn.addEventListener('click', sendCommand);
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        voiceBtn.addEventListener('click', () => {
            if (!recognition) return;
            
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                voiceBtn.classList.add('listening');
                voiceBtn.textContent = '⏸';
            }
        });

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                commandInput.value = chip.dataset.command;
                sendCommand();
            });
        });

        // Initial load
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
