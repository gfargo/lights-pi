<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>River's Way Lighting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      user-select: none;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      opacity: 0.9;
    }

    .logo-name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 2.25rem;
      background: #f0f0f0;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover  { background: #ffffff; }
    .btn:active { transform: scale(0.97); }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="logo">
    <!-- Replace with your studio logo image:
         <img src="logo.png" alt="Studio logo" class="logo-icon" />
    -->
    <svg class="logo-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="36" cy="36" r="34" stroke="#444" stroke-width="2"/>
      <circle cx="36" cy="36" r="10" fill="#f0f0f0" opacity="0.9"/>
      <line x1="36" y1="4"  x2="36" y2="16" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="36" y1="56" x2="36" y2="68" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="4"  y1="36" x2="16" y2="36" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="56" y1="36" x2="68" y2="36" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="14.1" y1="14.1" x2="22.4" y2="22.4" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="49.6" y1="49.6" x2="57.9" y2="57.9" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="57.9" y1="14.1" x2="49.6" y2="22.4" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      <line x1="22.4" y1="49.6" x2="14.1" y2="57.9" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="logo-name">River's Way</span>
    <span class="logo-sub">Lighting Controller</span>
  </div>

  <a class="btn" href="__QLC_URL__">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12
               M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    Lighting Control
  </a>

  <footer>lights.local</footer>

</body>
</html>
